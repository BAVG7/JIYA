    const barOuter = h("div", {style:{height:"6px",background:"var(--bg3)",borderRadius:"3px",overflow:"hidden"}});
    const barInner = h("div", {style:{height:"100%",width:widthPct+"%",background:c.color,borderRadius:"3px",transition:"width .3s"}});
    barOuter.appendChild(barInner);
    row.appendChild(barOuter);
    catCard.appendChild(row);
  });
  const quiet = sortedCats.filter(c => (stats.catCounts[c.id]||0) === 0);
  if(quiet.length && stats.totalMoments > 0) {
    catCard.appendChild(h("div", {style:{marginTop:"14px",padding:"10px 12px",background:"var(--bg3)",borderRadius:"var(--radius-sm)",border:"1px dashed var(--border2)"}},
      h("div", {style:{fontSize:"11px",color:"var(--text3)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:"4px"}}, "Quiet this " + mode),
      h("div", {style:{fontSize:"13px",color:"var(--text2)"}}, quiet.map(c=>c.label).join(" · "))
    ));
  }
  wrap.appendChild(catCard);

  // ─── Day ratings chart (week mode only) ───
  if(mode === "week") {
    const ratingsCard = h("div", {className:"card"});
    ratingsCard.appendChild(h("div", {className:"card-title"}, h("span",{className:"icon"},"⭐"), "Daily ratings"));
    ratingsCard.appendChild(h("div", {style:{fontSize:"11px",color:"var(--text3)",marginBottom:"14px"}}, "How you rated each day at the nightly rundown (out of 10)."));
    const chart = h("div", {style:{display:"flex",alignItems:"flex-end",gap:"6px",height:"120px"}});
    const dayLabels = ["S","M","T","W","T","F","S"];
    dates.forEach((date, i) => {
      const day = state.days[date];
      const rating = day?.night?.rating; // 0-9 means 1-10
      const has = rating !== null && rating !== undefined;
      const heightPct = has ? ((rating + 1) / 10) * 100 : 0;
      const barColor = has ? (rating >= 6 ? "var(--green)" : rating >= 3 ? "var(--orange)" : "var(--red)") : "var(--bg3)";
      chart.appendChild(h("div", {style:{flex:"1",display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",height:"100%"}},
        h("div", {style:{flex:"1",width:"100%",display:"flex",alignItems:"flex-end",justifyContent:"center"}},
          h("div", {
            title: has ? (fmtS(date) + ": " + (rating+1) + "/10") : (fmtS(date) + ": no rating"),
            style:{width:"100%",height:heightPct+"%",minHeight:has?"4px":"2px",background:barColor,borderRadius:"4px 4px 0 0",transition:"height .3s"}
          })
        ),
        h("div", {style:{fontSize:"10px",color:"var(--text3)",fontWeight:"600"}}, dayLabels[i]),
        h("div", {style:{fontSize:"9px",color:"var(--text4)"}}, has ? String(rating+1) : "—")
      ));
    });
    ratingsCard.appendChild(chart);
    wrap.appendChild(ratingsCard);
  }

  // ─── Mood / Energy / Sleep trend ───
  const trendDays = dates.map(date => {
    const day = state.days[date];
    return {
      date,
      mood: day?.morning?.mood,
      energy: day?.morning?.energy,
      sleep: day?.morning?.sleep
    };
  });
  const hasTrendData = trendDays.some(d => d.mood !== null && d.mood !== undefined || d.energy !== null && d.energy !== undefined || d.sleep !== null && d.sleep !== undefined);
  if(hasTrendData) {
    const trendCard = h("div", {className:"card"});
    trendCard.appendChild(h("div", {className:"card-title"}, h("span",{className:"icon"},"📈"), "Mood · Energy · Sleep"));
    const renderTrendRow = (label, key, max, accent, scaleFn) => {
      const row = h("div", {style:{marginBottom:"14px"}});
      row.appendChild(h("div", {style:{fontSize:"11px",color:"var(--text3)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:"6px"}}, label));
      const bars = h("div", {style:{display:"flex",alignItems:"flex-end",gap:"3px",height:"40px"}});
      trendDays.forEach(d => {
        const v = d[key];
        const has = v !== null && v !== undefined;
        const heightPct = has ? (scaleFn ? scaleFn(v) : ((v + 1) / max) * 100) : 0;
        bars.appendChild(h("div", {
          title: fmtS(d.date) + ": " + (has ? v : "—"),
          style:{flex:"1",height:heightPct+"%",minHeight:has?"3px":"2px",background:has?accent:"var(--bg3)",borderRadius:"3px 3px 0 0",transition:"height .3s"}
        }));
      });
      row.appendChild(bars);
      return row;
    };
    // mood is reversed (0 = best), energy/sleep normal
    trendCard.appendChild(renderTrendRow("Mood", "mood", 5, "var(--gold)", v => ((4 - v + 1) / 5) * 100));
    trendCard.appendChild(renderTrendRow("Energy", "energy", 5, "var(--orange)"));
    trendCard.appendChild(renderTrendRow("Sleep", "sleep", 5, "var(--blue)"));
    wrap.appendChild(trendCard);
  }

  // ─── By moment type ───
  const typeCard = h("div", {className:"card"});
  typeCard.appendChild(h("div", {className:"card-title"}, h("span",{className:"icon"},"🧭"), "By moment type"));
  const typeGrid = h("div", {style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"8px"}});
  MOMENT_TYPES.forEach(t => {
    const count = stats.typeCounts[t.id] || 0;
    typeGrid.appendChild(h("div", {style:{padding:"12px",background:"var(--bg3)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",display:"flex",alignItems:"center",gap:"10px"}},
      h("span", {style:{fontSize:"22px"}}, t.icon),
      h("div", {style:{flex:"1"}},
        h("div", {style:{fontSize:"11px",color:"var(--text3)",letterSpacing:".08em",textTransform:"uppercase"}}, t.label),
        h("div", {style:{fontSize:"18px",fontWeight:"700",color:t.color}}, String(count))
      )
    ));
  });
  typeCard.appendChild(typeGrid);
  wrap.appendChild(typeCard);

  // ─── Goals progress ───
  const goalKey = mode === "week" ? weekOf(anchor) : monthOf(anchor);
  const periodGoals = mode === "week" ? (state.wG[goalKey] || []) : (state.mG[goalKey] || []);
  if(periodGoals.length) {
    const goalsCard = h("div", {className:"card"});
    goalsCard.appendChild(h("div", {className:"card-title"}, h("span",{className:"icon"},"🎯"), "Goals this " + mode));
    const done = periodGoals.filter(g => g.done).length;
    goalsCard.appendChild(h("div", {style:{fontSize:"12px",color:"var(--text3)",marginBottom:"12px"}}, done + " / " + periodGoals.length + " complete"));
    periodGoals.forEach(g => {
      goalsCard.appendChild(h("div", {style:{display:"flex",alignItems:"center",gap:"10px",padding:"8px 0"}},
        h("span", {style:{fontSize:"16px"}}, g.done ? "✅" : "⬜"),
        h("span", {style:{fontSize:"14px",color:g.done?"var(--text3)":"var(--text)",textDecoration:g.done?"line-through":"none",flex:"1"}}, g.text || "Untitled")
      ));
    });
    wrap.appendChild(goalsCard);
  }

  // ─── Wins highlight reel ───
  const winsList = [];
  const lossesList = [];
  dates.forEach(date => {
    const day = state.days[date];
    if(!day) return;
    (day.moments || []).forEach(m => {
      if(m.type === "win") winsList.push({...m, date});
      else if(m.type === "loss") lossesList.push({...m, date});
    });
  });
  if(winsList.length) {
    const winsCard = h("div", {className:"card"});
    winsCard.appendChild(h("div", {className:"card-title", style:{color:"var(--green)"}}, h("span",{className:"icon"},"🏆"), "Wins this " + mode));
    winsList.slice(0, 12).forEach(w => {
      winsCard.appendChild(h("div", {style:{padding:"10px 0",borderBottom:"1px solid var(--border)"}},
        h("div", {style:{fontSize:"10px",color:"var(--text3)",marginBottom:"4px"}}, fmtS(w.date)),
        h("div", {style:{fontSize:"13px",color:"var(--text)",lineHeight:"1.5"}}, w.text)
      ));
    });
    if(winsList.length > 12) winsCard.appendChild(h("div", {style:{textAlign:"center",fontSize:"12px",color:"var(--text3)",marginTop:"8px"}}, "+ " + (winsList.length-12) + " more"));
    wrap.appendChild(winsCard);
  }
  if(lossesList.length) {
    const lossesCard = h("div", {className:"card"});
    lossesCard.appendChild(h("div", {className:"card-title", style:{color:"var(--red)"}}, h("span",{className:"icon"},"❌"), "Losses this " + mode));
    lossesList.slice(0, 12).forEach(w => {
      lossesCard.appendChild(h("div", {style:{padding:"10px 0",borderBottom:"1px solid var(--border)"}},
        h("div", {style:{fontSize:"10px",color:"var(--text3)",marginBottom:"4px"}}, fmtS(w.date)),
        h("div", {style:{fontSize:"13px",color:"var(--text)",lineHeight:"1.5"}}, w.text)
      ));
    });
    if(lossesList.length > 12) lossesCard.appendChild(h("div", {style:{textAlign:"center",fontSize:"12px",color:"var(--text3)",marginTop:"8px"}}, "+ " + (lossesList.length-12) + " more"));
    wrap.appendChild(lossesCard);
  }
}

// ─── Sunday auto-popup ───
function maybeShowSundayPopup() {
  const now = new Date();
  // Monthly popup on the 1st of the month (takes priority)
  if(now.getDate() === 1) {
    const todayStr = today();
    const dismissed = DB.get("monthDismissed").date;
    if(dismissed !== todayStr) {
      // summarize last month
      const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 15);
      const lastMonthAnchor = dateKey(lastMonth);
      const monthDates = getMonthRange(lastMonthAnchor);
      let hasData = false;
      for(const d of monthDates) {
        const day = state.days[d];
        if(day && (day.moments?.length || day.morning?.text || day.night?.text)) { hasData = true; break; }
      }
      if(hasData) {
        state.modal = {type:"monthPopup", anchor: lastMonthAnchor};
        render();
        return;
      }
    }
  }
  if(now.getDay() !== 0) return; // not Sunday
  const todayStr = today();
  const dismissed = DB.get("sundayDismissed").date;
  if(dismissed === todayStr) return;
  const week = getWeekRange(todayStr);
  let hasData = false;
  for(const d of week) {
    const day = state.days[d];
    if(day && (day.moments?.length || day.morning?.text || day.night?.text)) { hasData = true; break; }
  }
  if(!hasData) return;
  state.modal = {type:"sundayPopup"};
  render();
}


// ─── GOALS ───
function renderGoals(wrap) {
  const cd = state.dayDate; // daily key = current dayDate
  const cw = weekOf(state.dayDate), cm = monthOf(state.dayDate);
  const cdG = (state.dG[cd] || []).filter(g => !g.killed);
  const cwG = (state.wG[cw] || []).filter(g => !g.killed);
  const cmG = (state.mG[cm] || []).filter(g => !g.killed);

  // ─── Daily card ───
  const dCard = h("div", {className:"card"});
  dCard.appendChild(h("div", {className:"card-title", style:{color:"var(--orange)"}},
    h("span", {className:"icon"}, "☀️"), "Daily — " + fmtS(cd)
  ));
  cdG.forEach(g => {
    const streak = dailyGoalStreak(g);
    const row = h("div", {className:"goal"},
      h("button", {className:"goal-check"+(g.done?" done":""), onClick:()=>{
        g.done = !g.done;
        saveGoals(); render();
      }}, g.done?"✓":""),
      h("div", {style:{flex:"1",display:"flex",flexDirection:"column",gap:"2px"}},
        h("span", {className:"goal-text"+(g.done?" done":"")}, g.text),
        streak > 1 ? h("span", {style:{fontSize:"10px",color:"var(--orange)",letterSpacing:".05em",fontWeight:"600"}}, "↻ Day " + streak) : null
      ),
      h("button", {className:"goal-rm", title:"Kill this goal", onClick:()=>{
        // Mark killed in original date entry, not just today's view
        Object.values(state.dG).forEach(list => {
          const found = list.find(x => x.id === g.id);
          if(found) found.killed = true;
        });
        saveGoals(); render();
      }}, "×")
    );
    dCard.appendChild(row);
  });
  if(!cdG.length) dCard.appendChild(h("div", {style:{color:"var(--text4)",fontSize:"13px",padding:"8px"}}, "No daily goals yet"));

  // Soft cap warning at 5+
  if(cdG.length >= 5) {
    dCard.appendChild(h("div", {style:{marginTop:"10px",padding:"10px 12px",background:"rgba(232,168,84,.08)",border:"1px solid rgba(232,168,84,.3)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--orange)",lineHeight:"1.5"}},
      "⚠️ " + cdG.length + " daily goals — this is a journal, not a task manager. Fewer goals = better follow-through."
    ));
  }

  const dInp = h("input", {placeholder:"Daily goal..."});
  dInp.value = state.newGoalScope === "daily" ? state.newGoal : "";
  dInp.addEventListener("focus", () => { state.newGoalScope = "daily"; });
  dInp.addEventListener("input", e => { state.newGoalScope = "daily"; state.newGoal = e.target.value; });
  const addD = () => {
    if(state.newGoalScope !== "daily") return;
    if(!state.newGoal.trim()) return;
    if(!state.dG[cd]) state.dG[cd] = [];
    state.dG[cd].push({
      id: Date.now() + Math.random(),
      text: state.newGoal.trim(),
      done: false,
      killed: false,
      firstSeen: cd,
      at: nowISO()
    });
    state.newGoal = ""; saveGoals(); render();
  };
  dInp.addEventListener("keydown", e => { if(e.key==="Enter") addD(); });
  dCard.appendChild(h("div", {style:{display:"flex",gap:"8px",marginTop:"10px"}},
    dInp,
    h("button", {className:"btn", style:{width:"auto",padding:"10px 20px",background:"var(--orange)",color:"var(--bg)"}, onClick:addD}, "+")
  ));
  if(cdG.length) {
    const done = cdG.filter(g=>g.done).length;
    dCard.appendChild(h("div", {className:"prog"}, done+"/"+cdG.length+" done",
      h("div", {className:"prog-bar"}, h("div", {className:"prog-fill", style:{width:(done/cdG.length*100)+"%",background:"var(--orange)"}}))
    ));
  }
  wrap.appendChild(dCard);

  // ─── Weekly card ───
  const wCard = h("div", {className:"card"});
  wCard.appendChild(h("div", {className:"card-title"},
    h("span", {className:"icon"}, "📅"), "Weekly — "+fmtS(cw)
  ));

      h("button", {className:"goal-check"+(g.done?" done":""), onClick:()=>{g.done=!g.done; saveGoals(); render();}}, g.done?"✓":""),
      h("span", {className:"goal-text"+(g.done?" done":"")}, g.text),
      h("button", {className:"goal-rm", onClick:()=>{
        const found = (state.wG[cw]||[]).find(x => x.id === g.id);
        if(found) found.killed = true;
        saveGoals(); render();
      }}, "×")
    ));
  });
  if(!cwG.length) wCard.appendChild(h("div", {style:{color:"var(--text4)",fontSize:"13px",padding:"8px"}}, "No weekly goals yet"));
  const wInp = h("input", {placeholder:"Weekly goal..."});
  wInp.value = state.newGoalScope === "weekly" ? state.newGoal : "";
  wInp.addEventListener("focus", () => { state.newGoalScope = "weekly"; });
  wInp.addEventListener("input", e => { state.newGoalScope = "weekly"; state.newGoal = e.target.value; });
  const addW = () => {
    if(state.newGoalScope !== "weekly") return;
    if(!state.newGoal.trim()) return;
    if(!state.wG[cw]) state.wG[cw] = [];

  };
  wInp.addEventListener("keydown", e => { if(e.key==="Enter") addW(); });
  wCard.appendChild(h("div", {style:{display:"flex",gap:"8px",marginTop:"10px"}},
    wInp,
    h("button", {className:"btn btn-gold", style:{width:"auto",padding:"10px 20px"}, onClick:addW}, "+")
  ));
  if(cwG.length) {
    const done = cwG.filter(g=>g.done).length;
    wCard.appendChild(h("div", {className:"prog"}, done+"/"+cwG.length+" done",
      h("div", {className:"prog-bar"}, h("div", {className:"prog-fill", style:{width:(done/cwG.length*100)+"%",background:"var(--gold)"}}))
    ));

  // ─── Monthly card ───
  const mCard = h("div", {className:"card"});
  mCard.appendChild(h("div", {className:"card-title", style:{color:"var(--purple)"}},
    h("span", {className:"icon"}, "🗓️"), "Monthly — "+fmtM(cm)
  ));
  cmG.forEach(g => {
    mCard.appendChild(h("div", {className:"goal"},
      h("button", {className:"goal-check"+(g.done?" done":""), onClick:()=>{g.done=!g.done; saveGoals(); render();}}, g.done?"✓":""),
      h("span", {className:"goal-text"+(g.done?" done":"")}, g.text),
      h("button", {className:"goal-rm", onClick:()=>{
        const found = (state.mG[cm]||[]).find(x => x.id === g.id);
        if(found) found.killed = true;
        saveGoals(); render();
      }}, "×")
    ));

  const mInp = h("input", {placeholder:"Monthly goal..."});

    state.mG[cm].push({id:Date.now()+Math.random(),text:state.newGoal.trim(),done:false,killed:false,at:nowISO()});

// ─── SYNC ───
function renderSync(wrap) {
  const dayCount = Object.keys(state.days).length;
  const totalMoments = Object.values(state.days).reduce((s,d) => s + (d.moments?.length||0), 0);
  const d = state.drive;

  // ─── Drive sync card ───
  const driveCard = h("div", {className:"card"});
  driveCard.appendChild(h("div", {className:"card-title", style:{color:"#4285f4"}},
    h("span", {className:"icon"}, "☁️"), "Google Drive Sync"
  ));

  if(!d.ready) {
    driveCard.appendChild(h("div", {style:{padding:"16px",textAlign:"center",color:"var(--text3)",fontSize:"13px"}},
      "Loading Google libraries…"));
  } else if(d.status === "needsAuth") {
    // Drive connection went stale (common on iOS PWA cookie jar expiry).
    // Single tap reconnects — Google remembers the account, no password needed.
    driveCard.appendChild(h("div", {style:{color:"var(--text2)",fontSize:"13px",lineHeight:"1.6",marginBottom:"14px"}},
      "Your Drive connection expired. Tap below to reconnect — Google already knows your account, so this is one tap. Your local data is safe."
    ));
    driveCard.appendChild(h("button", {
      className:"btn",
      style:{background:"var(--orange)",color:"var(--bg)",fontWeight:"600",width:"100%",padding:"14px",marginBottom:"10px"},
      onClick: () => driveSignIn(false)
    }, "↻ Reconnect Drive"));
    driveCard.appendChild(h("button", {
      className:"btn btn-ghost",
      style:{width:"100%",fontSize:"12px"},
      onClick: () => {
        if(confirm("Sign out completely? You'll need to pick your account on next sign-in.")) driveSignOut();
      }
    }, "Sign out instead"));
  } else if(!d.signedIn) {
    driveCard.appendChild(h("div", {style:{color:"var(--text2)",fontSize:"13px",lineHeight:"1.6",marginBottom:"14px"}},
      "Sign in once with your Google account. After that, every entry auto-saves to Drive within a few seconds. The app only sees files it creates — your other Drive files are private."
    ));
    driveCard.appendChild(h("button", {
      className:"btn",
      style:{background:"#4285f4",color:"#fff",fontWeight:"600",width:"100%",padding:"14px"},
      onClick: () => driveSignIn(false)
    }, "🔐 Sign in with Google"));
    if(d.lastError) {
      driveCard.appendChild(h("div", {style:{marginTop:"12px",padding:"10px",background:"rgba(200,126,126,.1)",border:"1px solid var(--red)",borderRadius:"var(--radius-sm)",fontSize:"12px",color:"var(--red)"}},
        "Last error: " + d.lastError));
    }
  } else {
    // Signed in
    const statusText = d.status === "synced" ? "✓ All changes saved to Drive"
                     : d.status === "syncing" ? "↻ Syncing now…"
                     : d.status === "error" ? "⚠️ Sync error"
                     : d.status === "offline" ? "📴 Offline — will sync when reconnected"
                     : "Signed in, idle";
    const statusColor = d.status === "synced" ? "var(--green)"
                      : d.status === "syncing" ? "var(--yellow)"
                      : d.status === "error" ? "var(--red)"
                      : d.status === "offline" ? "var(--orange)"
                      : "var(--text2)";
    driveCard.appendChild(h("div", {style:{padding:"12px",background:"var(--bg3)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",marginBottom:"12px"}},
      h("div", {style:{fontSize:"13px",color:statusColor,fontWeight:"600",marginBottom:"4px"}}, statusText),
      d.userEmail ? h("div", {style:{fontSize:"11px",color:"var(--text3)"}}, "Account: " + d.userEmail) : null,
      d.lastSyncAt ? h("div", {style:{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}}, "Last sync: " + new Date(d.lastSyncAt).toLocaleString()) : null,
      d.lastError && d.status === "error" ? h("div", {style:{fontSize:"11px",color:"var(--red)",marginTop:"6px",lineHeight:"1.4"}}, d.lastError) : null
    ));

    driveCard.appendChild(h("div", {style:{display:"flex",gap:"8px",marginBottom:"12px"}},
      h("button", {
        className:"btn",
        style:{flex:"2",background:"var(--gold)",color:"var(--bg)",fontWeight:"600"},
        onClick: () => { performDriveSync(); }
      }, "↻ Sync now"),
      h("button", {
        className:"btn btn-ghost",
        style:{flex:"1"},
        onClick: () => {
          if(confirm("Sign out of Google Drive? Local data stays intact.")) driveSignOut();
        }
      }, "Sign out")
    ));

    driveCard.appendChild(h("div", {style:{fontSize:"11px",color:"var(--text3)",lineHeight:"1.6",padding:"8px 4px"}},
      "Auto-syncs ~2.5s after every save. Files written: ",
      h("code", {style:{color:"var(--gold)"}}, "jiya-journal-latest.json"),
      " (rolling) and ",
      h("code", {style:{color:"var(--gold)"}}, "jiya-journal-" + today() + ".json"),
      " (daily snapshot)."
    ));
  }
  wrap.appendChild(driveCard);

  // ─── Settings card ───
  const settingsCard = h("div", {className:"card"});
  settingsCard.appendChild(h("div", {className:"card-title"},
    h("span", {className:"icon"}, "⚙️"), "Settings"
  ));
  settingsCard.appendChild(h("div", {style:{display:"flex",flexDirection:"column",gap:"10px",fontSize:"13px"}},
    h("div", {style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--border)"}},
      h("span", {style:{color:"var(--text3)"}}, "User"),
      h("span", {style:{color:"var(--text)",fontWeight:"600"}}, CONFIG.userName)
    ),
    h("div", {style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--border)"}},
      h("span", {style:{color:"var(--text3)"}}, "Total days"),
      h("span", {style:{color:"var(--text)",fontWeight:"600"}}, String(dayCount))
    ),
    h("div", {style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--border)"}},
      h("span", {style:{color:"var(--text3)"}}, "Total moments"),
      h("span", {style:{color:"var(--text)",fontWeight:"600"}}, String(totalMoments))
    ),
    h("div", {style:{display:"flex",justifyContent:"space-between",padding:"8px 0"}},
      h("span", {style:{color:"var(--text3)"}}, "Drive folder"),
      h("span", {style:{color:"var(--text)",fontWeight:"600",fontSize:"11px",fontFamily:"monospace"}}, CONFIG.driveFolderId.slice(0,12) + "…")
    )
  ));
  wrap.appendChild(settingsCard);

  // ─── Manual export (fallback) ───
  const exportCard = h("div", {className:"card"});
  exportCard.appendChild(h("div", {className:"card-title"},
    h("span", {className:"icon"}, "📦"), "Manual Export"
  ));
  exportCard.appendChild(h("div", {style:{color:"var(--text2)",fontSize:"12px",lineHeight:"1.5",marginBottom:"12px"}},
    "Download a JSON snapshot to your device — useful as a one-off backup or for sharing with Claude."
  ));
  exportCard.appendChild(h("button", {
    className:"btn btn-ghost",
    style:{width:"100%"},
    onClick: () => {
      const blob = new Blob([buildSyncPayload()], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "jiya-journal-" + today() + ".json";
      a.click(); URL.revokeObjectURL(url);
      toast("Exported ✓");
    }
  }, "📦 Download JSON"));
  wrap.appendChild(exportCard);

  // ─── Reset (danger) ───
  const resetCard = h("div", {className:"card"});
  resetCard.appendChild(h("div", {className:"card-title", style:{color:"var(--red)"}},
    h("span", {className:"icon"}, "⚠️"), "Reset Data"
  ));
  resetCard.appendChild(h("div", {style:{color:"var(--text2)",fontSize:"13px",lineHeight:"1.6",marginBottom:"12px"}},
    "Deletes all local data. Drive backups stay intact and can be re-imported manually. Export first if you want a local copy."
  ));
  resetCard.appendChild(h("button", {
    className:"btn",
    style:{background:"var(--red)",color:"var(--bg)",width:"100%"},
    onClick: () => {
      if(confirm("Delete ALL local journal data permanently?")) {
        if(confirm("Really? There's no undo. (Drive backups are unaffected.)")) {
          localStorage.removeItem("jiya-days");
          localStorage.removeItem("jiya-daily");
          localStorage.removeItem("jiya-weekly");
          localStorage.removeItem("jiya-monthly");
          localStorage.removeItem("jiya-sundayDismissed");
          localStorage.removeItem("jiya-monthDismissed");
          state.days = {}; state.dG = {}; state.wG = {}; state.mG = {};
          state.dayDate = today(); initDay();
          toast("Local data cleared");
          render();
        }
      }
    }
  }, "🗑️ Delete All Local Data"));
  wrap.appendChild(resetCard);
}

// Initial render
render();
maybeShowSundayPopup();
driveInit();
</script>
</body>
</html>
